name: Dzienny raport cen energii TGE

on:
  schedule:
    # Uruchamia się codziennie o 14:30 (UTC+1 = 15:30 PL) - po publikacji Fixing I
    - cron: "30 13 * * *"

  # Możliwość ręcznego uruchomienia z panelu GitHub
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Zainstaluj zależności
        run: pip install httpx beautifulsoup4 lxml matplotlib

      - name: Uruchom raport
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
        run: python report.py

      - name: Powiadom o błędzie
        if: failure()
        run: echo "Raport nie został wysłany. Sprawdź logi powyżej."
